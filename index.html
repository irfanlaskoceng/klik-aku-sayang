
<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="image/img1.png">
    <title>Derojatul Jannah</title>
    <link rel="icon" type="image/png" href="image/img1.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #27263e;
            padding: 0;
            margin: 0;
        }

        
        @keyframes pulseBorder {
            0% {
                /* transform: scale(1); */
                box-shadow:
                    0 0 4px rgba(255, 59, 59, 0.4),
                    inset 0 0 2px rgba(255, 59, 59, 0.4);
            }

            50% {
                /* transform: scale(1.04); */
                box-shadow:
                    0 0 14px rgba(255, 59, 59, 0.9),
                    inset 0 0 6px rgba(255, 122, 122, 0.8);
            }

            100% {
                /* transform: scale(1); */
                box-shadow:
                    0 0 4px rgba(255, 59, 59, 0.4),
                    inset 0 0 2px rgba(255, 59, 59, 0.4);
            }
        }

        

        /* Smooth fade in-out */
        @keyframes smoothBlink {
            0% {
                opacity: 1;
                box-shadow: 0 0 0 rgba(255, 157, 0, 0);
            }

            50% {
                opacity: 0.4;
                box-shadow: 0 0 10px rgba(255, 157, 0, 0.7);
            }

            100% {
                opacity: 1;
                box-shadow: 0 0 0 rgba(255, 157, 0, 0);
            }
        }

        .warning-card {
            width: 320px;
            height: 60px;
            border-radius: 12px;
            background: rgba(255, 157, 0, 0.25);
            border: 1px solid rgba(255, 157, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            color: rgba(255, 157, 0, 0.6);
            animation: smoothBlink 1.8s ease-in-out infinite;
        }


        .critical-card {
            width: 320px;
            height: 60px;
            border-radius: 12px;
            background: rgba(255, 59, 59, 0.25);
            border: 1px solid rgba(255, 59, 59, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 1px;
            color: #ff3b3b;
            animation: criticalBlink 1.2s ease-in-out infinite;
        }
        .main-img {
            height: 160px;
            width: 190px;
        }
        .footer-img {
            height: 60px;
            width: 60px;
            margin-bottom: 5px;
        }
        .footer-img2 {
            height: 70px;
            width: 70px;
            margin-bottom: 5px;
            animation: slideLoop 1s linear infinite alternate;
        }

        /* Blink lebih cepat & tegas */
        @keyframes criticalBlink {
            0% {
                opacity: 1;
                box-shadow: 0 0 0 rgba(255, 59, 59, 0);
            }

            50% {
                opacity: 0.35;
                box-shadow: 0 0 10px rgba(255, 59, 59, 0.9);
            }

            100% {
                opacity: 1;
                box-shadow: 0 0 0 rgba(255, 59, 59, 0);
            }
        }

        @keyframes slideLoop  {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(var(--slide-distance));
            }
        }
    </style>
</head>

<body>
    <div style="position: absolute; font-size: 16px; color: #afafaf; bottom: 35px; z-index: 0; width: 100%; ">
        <div style="display: flex; align-items: center; margin-left: 20px; margin-right: 20px;">
            <div id="parent-img-left" style="flex: 1;">
                <img class="footer-img2" src="image/img5.png" alt="">
            </div>
            <div id="parent-img-right">
                <img class="footer-img" src="image/img4.png" alt="">
            </div>
        </div>
    </div>
    <div style="position: absolute; font-size: 16px; color: #afafaf; bottom: 10px; z-index: 0; width: 100%;">
        <div style="display: flex;justify-content: space-between; margin-left: 20px; margin-right: 20px;">
            <div>Muhammad Irfan</div>
            <div>Derojatul Jannah</div>
        </div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 50px; margin-top: 60px;">
        <div id="my-text" style="color: aliceblue; font-size: 30px; margin-bottom: 15px;">Kamu sayang aku gak sayang?</div>
        <img  id="img" class="main-img" src="image/img1.png" alt="">
    </div>
    <div style="display: flex; flex-direction: row; gap: 12px; justify-content: center;">
        <div id = "btn_y" class="warning-card" style="cursor: pointer;">
            Ya
        </div>
        <br>
        <div id="btn" class="critical-card">
            Tidak
        </div>
    </div>
</body>

<script>
  const img = document.getElementById("img");
  const btn = document.getElementById("btn");
  const btn_y = document.getElementById("btn_y");
  const my_text = document.getElementById("my-text");
  const footer_img2 = document.querySelector(".footer-img2");
  const parent_img_left = document.getElementById("parent-img-left");
  const parent_img_right = document.getElementById("parent-img-right");
  const slide_distance = parent_img_left.offsetWidth - parent_img_right.offsetWidth - 10;
  const speed = 60; // pixel per detik (ubah sesuai kebutuhan)
  const duration = slide_distance / speed;
  
  footer_img2.style.setProperty("--slide-distance", slide_distance + "px");
  footer_img2.style.animationDuration = duration + "s";

  let setItv;

  let n = 1;
  let text_btn_n = {'1':'Tidak', '2': 'Please jangan tidak', '3': 'Please jangan tidak sayang...'}
  function bottonPos(){
    const maxX = window.innerWidth - btn.offsetWidth;
    const maxY = window.innerHeight - btn.offsetHeight;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;
    btn.style.position = 'absolute'
    btn.style.padding = '10px 20px'
    btn.style.cursor = 'pointer'
    btn.style.zIndex = '50'
    btn.style.left = randomX + "px";
    btn.style.top = randomY + "px";
  }

    function isMobile() {
        return window.innerWidth <= 1000;
    }

  

  btn.addEventListener("click", () => {
    n += 1;

    if (n <= 3) {
        btn.innerText = text_btn_n[String(n)]
        img.src = `image/img${n}.png`;
    }
    if (n === 4) {
        bottonPos();
        if (isMobile()) {
           setItv = setInterval(() => {
                bottonPos();
            }, 1000); 
        }
    }
  });
  btn.addEventListener("mouseenter", () => {
    if (n > 3 && n < 1000) {
        bottonPos();
    }
  });

  btn_y.addEventListener("click", () => {
    clearInterval(setItv)
        n = 1000;
        img.src = `image/img0.png`;
        my_text.innerText = `Terima kasih sayang... aku juga sayang kamu kok 😘`;
        btn.style.position = ''
        btn.style.padding = ''
        btn.style.cursor = ''
        btn.innerText = 'Tidak'
  });
</script>

</html>
